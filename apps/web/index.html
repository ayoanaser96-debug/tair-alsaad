<!DOCTYPE html>
<html lang="en">
  <head>
    <script>
      (function () {
        try {
          var v = localStorage.getItem("preferredLanguage");
          var ar = false;
          if (v === "ar") ar = true;
          else if (v === "en") ar = false;
          else {
            var n = (navigator.language || "").toLowerCase();
            ar = n.indexOf("ar") === 0;
          }
          document.documentElement.lang = ar ? "ar" : "en";
          document.documentElement.dir = ar ? "rtl" : "ltr";
        } catch (e) {}
      })();
    </script>
